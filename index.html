// RENDER LOOP
// ══════════════════════════════════════════════════════════════════
let lastT = performance.now();
function render() {
  requestAnimationFrame(render);
  const now = performance.now();
  const dt  = Math.min((now - lastT) / 1000, 0.1);
  lastT = now;
  controls.update();
  tickAnim(dt);
  
  // v6: Pulse collision spheres
  if (collisionSpheres.length > 0) {
    const pulse = 0.5 + 0.5 * Math.sin(now * 0.005);
    collisionSpheres.forEach(s => {
      if (s.material && s.material.opacity !== undefined) {
        s.material.opacity = 0.4 + pulse * 0.4;
      }
    });
  }
  
  renderer.render(scene, camera);
  lblRenderer.render(scene, camera);
}

function onResize() {
  const w = rp.clientWidth, h = rp.clientHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
  lblRenderer.setSize(w, h);
}
new ResizeObserver(onResize).observe(rp);

document.getElementById('btn-reset').addEventListener('click', resetAnim);
document.getElementById('btn-upd').addEventListener('click', buildWire);

document.getElementById('addstepbtn').addEventListener('click', () => addStep());

document.getElementById('wdiam').addEventListener('change', buildWire);
document.getElementById('wmat').addEventListener('change', buildWire);
document.getElementById('bradius').addEventListener('change', buildWire);

document.getElementById('showlabels').addEventListener('change', e => {
  labelsVisible = e.target.value === '1';
  labelObjs.forEach(l => { l.element.style.display = labelsVisible ? '' : 'none'; });
});

document.getElementById('axis-toggle-btn').addEventListener('click', toggleAxisGuide);

// v6: Physics controls
document.getElementById('chk-collision').addEventListener('change', e => {
  collisionEnabled = e.target.checked;
  buildWire();
});

document.getElementById('chk-autocurl').addEventListener('change', e => {
  autoCurlEnabled = e.target.checked;
  buildWire();
});

document.getElementById('rng-mincurv').addEventListener('input', e => {
  minCurvatureMultiplier = parseFloat(e.target.value);
  document.getElementById('lbl-mincurv').textContent = minCurvatureMultiplier + 'x';
  buildWire();
});

document.getElementById('collision-resolve-btn').addEventListener('click', resolveCollisions);

// Mode buttons
document.getElementById('btn-mode-instant').addEventListener('click', () => {
  simMode = false;
  document.getElementById('btn-mode-instant').classList.add('on');
  document.getElementById('btn-mode-sim').classList.remove('on','sim-on');
  document.getElementById('speed-wrap').style.display = 'none';
  document.getElementById('sim-info').style.display = 'none';
  if (animPlaying) resetAnim();
});

document.getElementById('btn-mode-sim').addEventListener('click', () => {
  simMode = true;
  document.getElementById('btn-mode-sim').classList.add('on','sim-on');
  document.getElementById('btn-mode-instant').classList.remove('on');
  document.getElementById('speed-wrap').style.display = 'flex';
  if (animPlaying) resetAnim();
});

document.getElementById('sim-speed').addEventListener('input', e => {
  simSpeedMult = parseFloat(e.target.value);
  document.getElementById('sim-speed-lbl').textContent = simSpeedMult.toFixed(2).replace(/0$/, '') + 'x';
});

// Quill rotation
document.getElementById('quill-rot').addEventListener('input', e => {
  const deg = parseFloat(e.target.value);
  document.getElementById('quill-rot-lbl').textContent = deg + '°';
  // Rotate the quill group around X axis
  if (machineGroup && machineGroup.children[0]) {
    machineGroup.children[0].rotation.x = THREE.MathUtils.degToRad(deg);
  }
});

// Wire rotation (rotates entire formed wire around its feed axis)
document.getElementById('wire-rot').addEventListener('input', e => {
  const deg = parseFloat(e.target.value);
  document.getElementById('wire-rot-lbl').textContent = deg + '°';
  if (wireMesh) {
    wireMesh.rotation.x = THREE.MathUtils.degToRad(deg);
  }
});

// Mobile editor toggle
document.getElementById('mobile-toggle').addEventListener('click', () => {
  const lp = document.getElementById('lp');
  const btn = document.getElementById('mobile-toggle');
  if (lp.style.display === 'none') {
    lp.style.display = 'flex';
    btn.textContent = '🎬';
    btn.title = '3D 뷰 확대';
  } else {
    lp.style.display = 'none';
    btn.textContent = '📝';
    btn.title = '에디터 열기';
  }
  onResize();
});

// Collapse toggles
document.querySelectorAll('.collapse-toggle').forEach(tog => {
  tog.addEventListener('click', () => {
    const bodyId = tog.id.replace('toggle-', 'body-');
    const body = document.getElementById(bodyId);
    if (body.style.display === 'none') {
      body.style.display = '';
      tog.textContent = tog.textContent.replace('▶', '▼');
    } else {
      body.style.display = 'none';
      tog.textContent = tog.textContent.replace('▼', '▶');
    }
  });
});

// Theme toggle
document.getElementById('btn-theme').addEventListener('click', () => {
  const isLight = document.documentElement.classList.toggle('light');
  document.getElementById('btn-theme').textContent = isLight ? '☀️' : '🌙';
  const bg = isLight ? 0xf0f0f0 : 0x090909;
  renderer.setClearColor(bg);
  scene.fog = new THREE.Fog(bg, 400, 1000);
  scene.background = new THREE.Color(bg);
});

// ══════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════
buildMachineHardware();
buildPresetBtns();
loadPreset('lhook'); // Simple L-hook as default (clean on first load)
onResize();
render();

</script>
</body>
</html>
