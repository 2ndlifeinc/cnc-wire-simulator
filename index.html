<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CNC 와이어 포밍 시뮬레이터 v8</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#090909;--panel:#0f0f0f;--row:#161616;--border:#252525;
  --green:#00ff88;--gdim:#00aa55;--cyan:#00d4ff;--yellow:#ffcc00;
  --red:#ff4444;--text:#ddd;--dim:#666;--font:'Courier New',monospace;
}
:root.light{
  --bg:#f5f5f5;--panel:#ffffff;--row:#f0f0f0;--border:#d0d0d0;
  --green:#008844;--gdim:#00aa55;--cyan:#0066aa;--yellow:#aa7700;
  --red:#cc2222;--text:#222;--dim:#777;
}
:root.light #hdr{
background:var(--bg);}
:root.light .tab{background:var(--row);color:#555;}
:root.light .tab.on{background:#008844;color:#fff;}
:root.light .cb{background:var(--row);color:#333;}
:root.light .cb:hover{background:#ddfce8;}
:root.light .mode-btn{background:var(--row);color:#555;}
:root.light .mode-btn.on{background:#ddfce8;color:#006633;}
:root.light select.si, :root.light input.si{background:#fff;color:#222;border-color:#bbb;}
:root.light .steprow{background:#fafafa;border-color:#ddd;}
:root.light .steprow:hover{background:#f0faf5;}
:root.light .slbl{background:rgba(0,136,68,.85);color:#fff;}
:root.light #physics-info{background:rgba(245,245,245,0.9);border-color:#ddd;}
:root.light .physics-row label{color:#555;}
:root.light #v6-badge{background:#e0f0e8;color:#006633;}
:root.light #ftr{background:var(--bg);}
:root.light .prbtn{background:var(--row);color:#555;}
:root.light .prbtn:hover{background:#ddfce8;border-color:#008844;}
:root.light .wi{background:#fff;color:#006633;border-color:#bbb;}
:root.light .wlabel{color:#555;}
:root.light .photo-drop-area{background:var(--row);color:#666;border-color:#bbb;}
:root.light .sec{background:var(--panel);}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);}
#app{display:flex;flex-direction:column;height:100vh;}

/* Header */
#hdr{

  background:var(--bg);border-bottom:2px solid var(--gdim);
  padding:5px 10px;display:flex;align-items:center;gap:6px;flex-shrink:0;flex-wrap:wrap;
}
.tabs{display:flex;gap:3px;}
.tab{
  background:var(--row);border:1px solid var(--border);color:var(--dim);
  padding:0 14px;cursor:pointer;font-family:var(--font);font-size:12px;transition:.15s;
  min-height:44px;display:flex;align-items:center;
}
.tab.on{background:var(--gdim);color:#000;border-color:var(--green);font-weight:bold;}
.pbc{display:flex;gap:4px;align-items:center;margin-left:auto;flex-wrap:wrap;}
.cb{
  background:var(--row);border:1px solid var(--border);color:var(--text);
  padding:0 11px;cursor:pointer;font-family:var(--font);font-size:12px;transition:.15s;
  min-height:44px;display:flex;align-items:center;white-space:nowrap;
}
.cb:hover{border-color:var(--green);color:var(--green);}
.cb.on{background:var(--green);color:#000;border-color:var(--green);}
#stepind{font-size:11px;color:var(--cyan);min-width:110px;text-align:right;}

/* Mode toggle group */
.mode-group{display:flex;border:1px solid var(--border);overflow:hidden;}
.mode-btn{
  background:var(--row);border:none;border-right:1px solid var(--border);color:var(--dim);
  padding:0 10px;cursor:pointer;font-family:var(--font);font-size:11px;transition:.15s;
  min-height:44px;white-space:nowrap;
}
.mode-btn:last-child{border-right:none;}
.mode-btn:hover{color:var(--text);}
.mode-btn.on{background:#0e2a1a;color:var(--green);font-weight:bold;}
.mode-btn.on.sim-on{background:#1a0e2a;color:#cc88ff;}

/* Speed control */
.speed-wrap{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--dim);padding:0 4px;}
.speed-wrap input[type=range]{width:60px;height:20px;accent-color:var(--green);cursor:pointer;}
#sim-speed-lbl{color:var(--cyan);min-width:28px;font-size:11px;}

/* Progress bar */
#progress-bar-wrap{height:3px;background:#111;flex-shrink:0;position:relative;}
#progress-bar{height:100%;background:linear-gradient(90deg,var(--gdim),var(--green));width:0%;transition:width 0.08s linear;}

/* Main */
#main{display:flex;flex:1;overflow:hidden;}

/* Left Panel */
#lp{
  width:400px;min-width:260px;background:var(--panel);
  border-right:2px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;
}
.sec{border-bottom:1px solid var(--border);padding:7px 9px;}
.sectitle{font-size:10px;color:var(--green);letter-spacing:2px;text-transform:uppercase;margin-bottom:7px;}
.collapse-sec{border-bottom:1px solid var(--border);padding:7px 9px;}
.collapse-toggle{margin-bottom:0 !important;user-select:none;}
.collapse-toggle:hover{color:var(--cyan);}

/* Wire settings */
.wsettings{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.wg{display:flex;flex-direction:column;gap:2px;}
.wlabel{font-size:10px;color:var(--dim);}
.wi{
  background:var(--bg);border:1px solid var(--border);color:var(--green);
  padding:5px 7px;font-family:var(--font);font-size:12px;width:100%;min-height:38px;
}
.wi:focus{outline:none;border-color:var(--green);}

/* Physics settings row */
.physics-row{display:flex;gap:8px;align-items:center;margin-top:6px;flex-wrap:wrap;}
.physics-row label{font-size:10px;color:var(--dim);display:flex;align-items:center;gap:4px;cursor:pointer;}
.physics-row input[type=checkbox]{accent-color:var(--green);cursor:pointer;width:14px;height:14px;}
.physics-row input[type=range]{width:70px;height:16px;accent-color:var(--green);cursor:pointer;}
.physics-row .pval{font-size:10px;color:var(--cyan);min-width:22px;}

/* Collision banner */
#collision-banner{
  display:none;position:absolute;top:50px;left:50%;transform:translateX(-50%);z-index:30;
  background:rgba(255,30,30,0.92);color:#fff;padding:6px 18px;font-family:var(--font);font-size:13px;
  border:1px solid #ff6666;backdrop-filter:blur(6px);white-space:nowrap;animation:pulse-banner 1.5s infinite;
}
@keyframes pulse-banner{0%,100%{opacity:1;}50%{opacity:0.7;}}
#collision-resolve-btn{
  background:#fff;color:#c00;border:none;padding:2px 10px;margin-left:10px;cursor:pointer;
  font-family:var(--font);font-size:11px;font-weight:bold;
}
#collision-resolve-btn:hover{background:#fdd;}

/* Presets */
.presets{display:flex;flex-wrap:wrap;gap:4px;}
.prbtn{
  background:var(--row);border:1px solid var(--border);color:#999;
  padding:0 10px;cursor:pointer;font-size:11px;font-family:var(--font);transition:.15s;
  min-height:36px;
}
.prbtn:hover{border-color:var(--cyan);color:var(--cyan);}

/* Step editor */
#se{flex:1;overflow-y:auto;padding:6px 5px;scroll-behavior:smooth;}
.steprow{
  display:flex;align-items:center;gap:3px;padding:4px 5px;margin-bottom:3px;
  background:var(--row);border:1px solid transparent;border-left:3px solid transparent;
  transition:.15s;font-size:11px;min-height:44px;
}
.steprow:hover{border-color:var(--border);}
.steprow.playing{border-left-color:var(--yellow);background:#2a2400;box-shadow:0 0 10px rgba(255,204,0,0.25);}
.steprow.done{border-left-color:var(--gdim);background:#0c1a10;}
.steprow.cut-row{border-left-color:#ff4444;background:#1a0808;}
.steprow.collision{border-left-color:#ff0000;background:#2a0000;box-shadow:0 0 8px rgba(255,0,0,0.3);animation:collisionPulse 1s infinite;}
.steprow.eng-warn{border-left-color:#ff6600;background:#2a1500;}
.steprow.eng-block{border-left-color:#ff0000;background:#3a0000;box-shadow:0 0 12px rgba(255,0,0,0.4);}
.steprow .eng-msg{display:block;font-size:10px;color:#ff6600;margin-top:2px;padding-left:24px;}
.steprow.eng-block .eng-msg{color:#ff4444;}
#sim-blocked{display:none;background:#3a0000;border:2px solid #ff0000;color:#ff4444;padding:8px 12px;margin:4px;border-radius:6px;font-size:12px;text-align:center;}
@keyframes collisionPulse{0%,100%{box-shadow:0 0 8px rgba(255,0,0,0.3);}50%{box-shadow:0 0 15px rgba(255,0,0,0.6);}}
.stepnum{color:var(--dim);font-size:11px;min-width:22px;}
select.si,input.si{
  background:var(--bg);border:1px solid var(--border);color:var(--text);
  font-family:var(--font);font-size:11px;padding:3px 3px;height:36px;
}
select.si{min-width:62px;}
input.si{width:46px;}
input.si.wide{width:54px;}
.slabel{color:var(--dim);font-size:10px;white-space:nowrap;}
.sdel{
  background:none;border:none;color:var(--red);cursor:pointer;
  font-size:16px;padding:0 4px;line-height:1;margin-left:1px;
  min-width:30px;min-height:30px;display:flex;align-items:center;justify-content:center;
}
.sdel:disabled{color:#333;cursor:not-allowed;}
.addbtn{
  width:100%;background:#0f0f0f;border:1px dashed #333;color:var(--gdim);
  padding:8px;cursor:pointer;font-family:var(--font);font-size:12px;margin-top:5px;transition:.15s;
  min-height:44px;
}
.addbtn:hover{border-color:var(--green);color:var(--green);}

/* Photo upload section */
#photo-sec{border-bottom:1px solid var(--border);padding:8px 9px;}
.photo-drop-area{
  border:1px dashed #334;background:#080810;padding:8px;text-align:center;
  cursor:pointer;transition:.15s;min-height:44px;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:4px;
}
.photo-drop-area:hover{border-color:var(--cyan);background:#080818;}
.photo-drop-area span{font-size:12px;color:var(--cyan);}
.photo-drop-area small{font-size:10px;color:var(--dim);}
#photo-preview{max-width:100%;max-height:90px;object-fit:contain;margin:5px 0;display:none;border:1px solid var(--border);background:#050505;}
#shape-input-area{display:none;margin-top:6px;}
.shape-row{display:flex;gap:4px;margin-bottom:4px;}
.shape-input{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--green);padding:6px 8px;font-family:var(--font);font-size:12px;min-height:38px;}
.shape-input::placeholder{color:var(--dim);}
.shape-gen-btn{background:#0a1a0a;border:1px solid var(--gdim);color:var(--green);padding:0 10px;cursor:pointer;font-family:var(--font);font-size:11px;transition:.15s;min-height:38px;white-space:nowrap;}
.shape-gen-btn:hover{background:#0f2a10;border-color:var(--green);}
.shape-gen-btn:disabled{opacity:.5;cursor:not-allowed;}
#photo-result{font-size:10px;color:var(--dim);margin-top:4px;line-height:1.6;min-height:14px;}
#slack-tpl{background:#08081a;border:1px solid #334;padding:6px 8px;font-size:10px;color:#88aacc;margin-top:5px;cursor:pointer;word-break:break-all;display:none;border-radius:2px;line-height:1.5;}
#slack-tpl:hover{border-color:var(--cyan);color:var(--cyan);}
#slack-tpl::before{content:"📋 클릭하여 복사 → ";color:var(--dim);}

/* Scrollbar */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:#111;}
::-webkit-scrollbar-thumb{background:#333;}
::-webkit-scrollbar-thumb:hover{background:var(--gdim);}

/* Right Panel */
#rp{flex:1;position:relative;overflow:hidden;}
#c3d{display:block;width:100%;height:100%;}
#lbl-layer{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;}

/* Floating axis toggle button */
#axis-toggle-btn{
  position:absolute;top:10px;right:10px;z-index:20;
  background:rgba(8,8,8,0.88);border:1px solid var(--border);color:var(--dim);
  padding:0 12px;cursor:pointer;font-family:var(--font);font-size:11px;transition:.2s;
  backdrop-filter:blur(6px);min-height:36px;display:flex;align-items:center;gap:5px;
}
#axis-toggle-btn:hover{border-color:var(--cyan);color:var(--cyan);}
#axis-toggle-btn.axis-on{border-color:var(--green);color:var(--green);background:rgba(0,15,8,0.88);}

/* Sim mode step badge */
#sim-info{
  position:absolute;bottom:10px;left:50%;transform:translateX(-50%);z-index:20;
  background:rgba(8,8,8,0.9);border:1px solid #cc88ff44;color:#cc88ff;
  padding:4px 14px;font-family:var(--font);font-size:11px;backdrop-filter:blur(4px);
  display:none;white-space:nowrap;
}

/* v6 badge */
#v6-badge{
  position:absolute;top:10px;left:10px;z-index:20;
  background:rgba(8,8,8,0.88);border:1px solid #ff884444;color:#ff8844;
  padding:3px 10px;font-family:var(--font);font-size:10px;backdrop-filter:blur(4px);
  pointer-events:none;
}

/* Nozzle flash effect */
@keyframes nozzleFlash{0%{opacity:0.3;}50%{opacity:1;}100%{opacity:0.3;}}
.nozzle-active{animation:nozzleFlash 0.3s infinite;}

/* Physics info panel */
#physics-info{
  position:absolute;bottom:10px;right:10px;z-index:20;
  background:rgba(8,8,8,0.88);border:1px solid #44444488;color:var(--dim);
  padding:4px 10px;font-family:var(--font);font-size:9px;backdrop-filter:blur(4px);
  line-height:1.6;max-width:220px;
}
#physics-info b{color:var(--cyan);}
#physics-info .warn{color:var(--red);}

/* Footer */
#ftr{
  background:var(--bg);border-top:1px solid var(--border);
  padding:4px 12px;display:flex;gap:20px;font-size:11px;color:var(--dim);flex-shrink:0;flex-wrap:wrap;
  align-items:center;
}
#ftr span b{color:var(--cyan);}

/* Step labels */
.slbl{
  background:rgba(0,200,100,.85);color:#000;padding:4px 8px;
  font-size:10px;font-family:monospace;border-radius:3px;white-space:nowrap;font-weight:bold;
  pointer-events:auto;cursor:pointer;user-select:none;
  -webkit-tap-highlight-color:rgba(0,200,100,.3);
}
.slbl:active{background:rgba(0,255,136,1);transform:scale(1.1);}
.slbl.rq{background:rgba(0,180,255,.85);}
.slbl.cut{background:rgba(255,80,80,.85);color:#fff;}
.slbl.sm{background:rgba(255,200,0,.85);}
.slbl.sol{background:rgba(160,80,255,.85);}

/* Responsive */
@media(max-width:750px){
  #main{flex-direction:column-reverse;}
  #lp{width:100%;max-height:50vh;border-right:none;border-top:2px solid var(--border);overflow-y:auto;-webkit-overflow-scrolling:touch;}
  #rp{flex:1;min-height:40vh;}
  
  /* Header: compact */
  #hdr{
padding:6px 8px;gap:4px;flex-wrap:wrap;}
  .tabs{display:none;}
  .tab{padding:0 10px;font-size:12px;min-height:44px;}
  .cb{padding:0 10px;font-size:13px;min-height:44px;}
  .mode-btn{padding:0 8px;font-size:12px;min-height:44px;}
  #stepind{font-size:12px;min-width:80px;}
  
  /* Left panel sections */
  .sec{padding:8px 10px;}
  .sectitle{font-size:11px;margin-bottom:6px;}
  .wsettings{gap:6px;}
  .wsettings label{font-size:12px;}
  .wsettings input,.wsettings select{font-size:16px !important;min-height:44px !important;} /* 16px = iOS zoom 방지 */
  
  /* Step editor rows — 터치 친화적 */
  .steprow{padding:8px 8px;gap:5px;flex-wrap:wrap;min-height:50px;}
  .stepnum{font-size:12px;min-width:22px;min-height:36px;display:flex;align-items:center;}
  select.si,input.si{font-size:16px !important;min-height:44px !important;padding:4px 6px;border-radius:6px;} /* 16px = iOS zoom 방지 */
  select.si{min-width:56px;}
  input.si{width:50px;}
  .slabel{font-size:11px;}
  .sdel{min-width:36px;min-height:36px;font-size:18px;border-radius:8px;}
  
  /* Presets */
  .presets{flex-wrap:wrap;}
  .presets button{font-size:12px;padding:8px 12px;min-height:44px;flex:1;min-width:80px;}
  
  /* Zoom slider */
  #zoom-slider{width:90px !important;height:30px;}
  
  /* Speed wrap */
  .speed-wrap{font-size:11px;}
  .speed-wrap input[type=range]{width:70px;height:30px;}
  
  /* Physics panel */
  #physics-info{font-size:11px;padding:6px 10px;}
  
  /* 3D labels bigger on mobile */
  .slbl{font-size:11px !important;padding:3px 6px !important;}
  
  /* Floating toggle for editor */
  #mobile-toggle{display:flex !important;}
  
  /* Add step buttons bigger */
  .add-step-row button,.add-step-row select{min-height:44px !important;font-size:14px !important;padding:6px 12px;}
}

/* Mobile editor toggle button */
#mobile-toggle{
  display:none;
  position:fixed;bottom:10px;right:10px;z-index:100;
  background:var(--green);color:#000;border:none;
  width:50px;height:50px;border-radius:50%;
  font-size:20px;cursor:pointer;
  align-items:center;justify-content:center;
  box-shadow:0 4px 12px rgba(0,255,136,0.4);
}
#mobile-toggle:active{transform:scale(0.9);}
</style>
</head>
<body>
<div id="app">
  <!-- ── HEADER ── -->
  <div id="hdr">
    <div class="tabs">
      <button class="tab on" id="tab1">1번 기계 (서보 CNC)</button>
      <button class="tab" id="tab2">2번 기계 (캠식 AI-TECH)</button>
    </div>
    <div class="pbc">
      <span id="stepind">STEP: --</span>
      <div class="mode-group">
        <button class="mode-btn on" id="btn-mode-instant" title="즉시 모드 – 빠르게 완성된 모습 확인">⚡ 즉시</button>
        <button class="mode-btn" id="btn-mode-sim" title="시뮬레이션 모드 – CNC 기계처럼 부드럽게 재생">🎬 시뮬</button>
      </div>
      <div class="speed-wrap" id="speed-wrap" style="display:none;">
        <span>속도</span>
        <input type="range" id="sim-speed" min="0.5" max="4" step="0.25" value="1.0">
        <span id="sim-speed-lbl">1.0x</span>
      </div>
      <button class="cb" id="btn-play">▶ 재생</button>
      <button class="cb" id="btn-pause">⏸ 정지</button>
      <button class="cb" id="btn-reset">⏹ 리셋</button>
      <button class="cb" id="btn-upd">⟳ 업데이트</button>
    </div>
    <div class="speed-wrap" style="margin-left:8px;">
      <span>🔍</span>
      <input type="range" id="zoom-slider" min="10" max="500" step="5" value="140" style="width:100px;accent-color:var(--cyan);">
      <span id="zoom-lbl" style="color:var(--cyan);min-width:32px;font-size:11px;">1.0x</span>
    </div>
    <button class="cb" id="btn-theme" title="라이트/다크 모드" style="font-size:16px;padding:0 8px;">🌙</button>
  </div>
  <div id="progress-bar-wrap"><div id="progress-bar"></div></div>

  <div id="main">
    <!-- ── LEFT PANEL ── -->
    <div id="lp">
      <!-- ★ 프리셋 (한 줄, 컴팩트) -->
      <div class="sec" style="padding:5px 9px;">
        <div class="presets" id="prbtnwrap" style="margin:0;"></div>
      </div>

      <!-- ★ 프로그램 에디터 (최상단 = 가장 중요) -->
      <div class="sec" style="padding:4px 9px 2px;">
        <div class="sectitle">프로그램 에디터 <span style="color:var(--dim);font-size:9px;" id="minfo">— 1번 기계</span></div>
      </div>
      <div id="se">
        <div id="sim-blocked">🚫 물리적으로 불가능한 시퀀스 — 수정 필요</div>
        <div id="steplist"></div>
        <button class="addbtn" id="addstepbtn">+ 스텝 추가 (CUT 위에 삽입)</button>
      </div>

      <!-- 접이식: 와이어 설정 -->
      <div class="sec collapse-sec">
        <div class="sectitle collapse-toggle" id="toggle-wire-settings" style="cursor:pointer;">
          ▶ 와이어 설정
        </div>
        <div class="collapse-body" id="body-wire-settings" style="display:none;">
          <div class="wsettings">
            <div class="wg"><span class="wlabel">선경 (mm)</span>
              <input class="wi" id="wdiam" type="number" value="4.0" step="0.1" min="0.5" max="10"></div>
            <div class="wg"><span class="wlabel">소재</span>
              <select class="wi" id="wmat">
                <option value="steel">강선 Steel</option>
                <option value="stainless">스테인레스</option>
                <option value="copper">동선 Copper</option>
                <option value="spring">스프링강</option>
              </select></div>
            <div class="wg"><span class="wlabel">벤딩 반경계수</span>
              <input class="wi" id="bradius" type="number" value="1.5" step="0.1" min="0.5" max="5"></div>
            <div class="wg"><span class="wlabel">스텝 라벨</span>
              <select class="wi" id="showlabels">
                <option value="1">표시</option>
                <option value="0">숨김</option>
              </select></div>

// v6: PHYSICS — BENDING DIRECTION (opposite of slide approach)
// ══════════════════════════════════════════════════════════════════

/**
 * v6: Get bend direction based on physics.
 * The slide approaches from a specific direction → wire bends in the OPPOSITE direction.
 * 
 * axisNum: 1-8 (X1-X8)
 * up: current local up vector
 * right: current local right vector (cross of forward × up)
 * 
 * X1 = 12 o'clock (+Y in YZ plane) → slide pushes DOWN → bend toward -Y (6 o'clock)
 * X3 = 3 o'clock (+Z in YZ plane)  → slide pushes LEFT → bend toward -Z (9 o'clock)
 * etc.
 */
function getBendDir(axisNum, up, right) {
  // Slide approach direction in local YZ plane
  const ang = THREE.MathUtils.degToRad((axisNum - 1) * 45);
  const slideY = Math.cos(ang); // component along up
  const slideZ = Math.sin(ang); // component along right
  
  // v6: Bend direction = OPPOSITE of slide direction
  // The slide pushes the wire, so wire deflects away from the slide
  const bendDir = new THREE.Vector3()
    .addScaledVector(up.clone().normalize(), -slideY)
    .addScaledVector(right.clone().normalize(), -slideZ)
    .normalize();
  
  return bendDir;
}

// ══════════════════════════════════════════════════════════════════
// v6: MINIMUM CURVATURE RADIUS ENFORCEMENT
// ══════════════════════════════════════════════════════════════════
function enforceMinCurvature(points, wireDiam, minRadiusMult) {
  if (points.length < 3) return points;
  const minR = wireDiam * minRadiusMult;
  const result = [points[0].clone()];
  
  for (let i = 1; i < points.length - 1; i++) {
    const prev = points[i - 1];
    const curr = points[i];
    const next = points[i + 1];
    
    const v1 = new THREE.Vector3().subVectors(curr, prev);
    const v2 = new THREE.Vector3().subVectors(next, curr);
    const l1 = v1.length();
    const l2 = v2.length();
    
    if (l1 < 1e-6 || l2 < 1e-6) {
      result.push(curr.clone());
      continue;
    }
    
    // Calculate curvature radius using the circumscribed circle of the triangle
    const cross = new THREE.Vector3().crossVectors(v1, v2);
    const crossLen = cross.length();
    
    if (crossLen < 1e-8) {
      // Points are collinear, infinite radius — OK
      result.push(curr.clone());
      continue;
    }
    
    // Menger curvature: κ = 2|sin(θ)| / |P2-P0|
    // Radius = 1/κ
    const d = new THREE.Vector3().subVectors(next, prev).length();
    const sinTheta = crossLen / (l1 * l2);
    const radius = d / (2 * sinTheta);
    
    if (radius < minR) {
      // Clamp: move point outward to achieve minR
      // Interpolate between the sharp bend and a straighter path
      const factor = radius / minR; // 0..1, smaller = sharper
      const midpoint = new THREE.Vector3().addVectors(prev, next).multiplyScalar(0.5);
      // Blend curr toward midpoint to soften the bend
      const softened = curr.clone().lerp(midpoint, 1 - factor);
      result.push(softened);
    } else {
      result.push(curr.clone());
    }
  }
  
  result.push(points[points.length - 1].clone());
  return result;
}

// ══════════════════════════════════════════════════════════════════
// v6: COLLISION DETECTION (capsule-based self-intersection)
// ══════════════════════════════════════════════════════════════════

/**
 * Minimum distance between two line segments (capsule approximation)
 * seg1: [A, B], seg2: [C, D]
 * Returns {dist, pointOnSeg1, pointOnSeg2}
 */
function segmentSegmentDistance(A, B, C, D) {
  const d1 = new THREE.Vector3().subVectors(B, A);
  const d2 = new THREE.Vector3().subVectors(D, C);
  const r  = new THREE.Vector3().subVectors(A, C);
  
  const a = d1.dot(d1);
  const e = d2.dot(d2);
  const f = d2.dot(r);
  
  let s, t;
  
  if (a <= 1e-8 && e <= 1e-8) {
    s = t = 0;
  } else if (a <= 1e-8) {
    s = 0;
    t = Math.max(0, Math.min(1, f / e));
  } else {
    const c_ = d1.dot(r);
    if (e <= 1e-8) {
      t = 0;
      s = Math.max(0, Math.min(1, -c_ / a));
    } else {
      const b_ = d1.dot(d2);
      const denom = a * e - b_ * b_;
      
      if (Math.abs(denom) > 1e-8) {
        s = Math.max(0, Math.min(1, (b_ * f - c_ * e) / denom));
      } else {
        s = 0;
      }
      
      t = (b_ * s + f) / e;
      
      if (t < 0) {
        t = 0;
        s = Math.max(0, Math.min(1, -c_ / a));
      } else if (t > 1) {
        t = 1;
        s = Math.max(0, Math.min(1, (b_ - c_) / a));
      }
    }
  }
  
  const p1 = A.clone().addScaledVector(d1, s);
  const p2 = C.clone().addScaledVector(d2, t);
  
  return {
    dist: p1.distanceTo(p2),
    pointOnSeg1: p1,
    pointOnSeg2: p2
  };
}

/**
 * Detect self-intersections in the wire.
 * Check all non-adjacent segments (gap ≥ 2).
 * Returns array of collision points.
 */
function detectCollisions(points, wireDiam, markers) {
  const collisions = [];
  const threshold = wireDiam; // segments closer than wire diameter = collision
  
  // Pre-compute cumulative arc-length for each point
  const arcLen = new Float64Array(points.length);
  arcLen[0] = 0;
  for (let i = 1; i < points.length; i++) {
    arcLen[i] = arcLen[i - 1] + points[i].distanceTo(points[i - 1]);
  }
  
  // Minimum arc-length separation to consider collision (wire must be far apart ALONG the path)
  const minArcSep = wireDiam * 6; // 6× wire diameter along the wire path
  
  for (let i = 0; i < points.length - 1; i++) {
    for (let j = i + 3; j < points.length - 1; j++) {
      // Skip if arc-length between segments is too small (they're close along the wire = not collision)
      if (arcLen[j] - arcLen[i] < minArcSep) continue;
      
      const result = segmentSegmentDistance(
        points[i], points[i + 1],
        points[j], points[j + 1]
      );
      
      if (result.dist < threshold) {
        collisions.push({
          point: result.pointOnSeg1.clone().add(result.pointOnSeg2).multiplyScalar(0.5),
          segA: i,
          segB: j,
          dist: result.dist,
          normal: new THREE.Vector3().subVectors(result.pointOnSeg1, result.pointOnSeg2).normalize()
        });
      }
    }
  }
  
  return collisions;
}

/**
 * v6: Apply deflection to resolve collisions.
 * Push colliding segments apart along the collision normal.
 */
function applyDeflection(points, collisions, wireDiam) {
  if (!collisions.length) return points;
  
  const result = points.map(p => p.clone());
  const iterations = 5;
  
  for (let iter = 0; iter < iterations; iter++) {
    const currentCollisions = detectCollisions(result, wireDiam);
    if (!currentCollisions.length) break;
    
    for (const col of currentCollisions) {
      const pushDist = (wireDiam - col.dist) * 0.6;
      if (pushDist <= 0) continue;
      
      const normal = col.normal;
      
      // Push segments apart
      // Move segment A points outward
      const aRange = Math.max(0, col.segA - 1);
      const aEnd = Math.min(result.length - 1, col.segA + 2);
      for (let k = aRange; k <= aEnd; k++) {
        const influence = 1 - Math.abs(k - col.segA) * 0.3;
        result[k].addScaledVector(normal, pushDist * 0.5 * influence);
      }
      
      // Move segment B points in opposite direction
      const bRange = Math.max(0, col.segB - 1);
      const bEnd = Math.min(result.length - 1, col.segB + 2);
      for (let k = bRange; k <= bEnd; k++) {
        const influence = 1 - Math.abs(k - col.segB) * 0.3;
        result[k].addScaledVector(normal, -pushDist * 0.5 * influence);
      }
    }
  }
  
  return result;
}

// ══════════════════════════════════════════════════════════════════
// v8: AUTO CURL EFFECT (collision → curl like a spring)
// ══════════════════════════════════════════════════════════════════

/**
 * Apply curl effect at collision points.
 * When wire intersects itself, instead of just pushing apart,
 * also curl the wire in the tangent direction (like a spring wrapping).
 * 
 * curl axis = cross(wire_tangent, collision_normal)
 * curl strength ∝ penetration depth
 * Affects ±5 nodes around collision with gaussian falloff
 */
function applyCurlEffect(points, collisions, wireDiam) {
  if (!collisions.length || points.length < 4) return points;
  
  const result = points.map(p => p.clone());
  const CURL_RADIUS = 5; // nodes affected on each side
  const CURL_STRENGTH = 0.8; // base curl multiplier
  
  for (const col of collisions) {
    const penetration = Math.max(wireDiam - col.dist, 0);
    if (penetration < 0.01) continue;
    
    // Get wire tangent at collision point (segment A)
    const segIdx = Math.min(col.segA, result.length - 2);
    const tangent = new THREE.Vector3().subVectors(
      result[Math.min(segIdx + 1, result.length - 1)],
      result[segIdx]
    ).normalize();
    
    // Curl axis = cross(tangent, collision_normal)
    const curlAxis = new THREE.Vector3().crossVectors(tangent, col.normal);
    if (curlAxis.length() < 1e-6) continue;
    curlAxis.normalize();
    
    // Curl angle proportional to penetration
    const curlAngle = (penetration / wireDiam) * CURL_STRENGTH * 0.15; // radians
    
    // Apply curl with gaussian falloff around collision point
    const centerIdx = Math.round((col.segA + col.segB) / 2);
    const startIdx = Math.max(1, centerIdx - CURL_RADIUS);
    const endIdx = Math.min(result.length - 2, centerIdx + CURL_RADIUS);
    
    for (let k = startIdx; k <= endIdx; k++) {
      const dist = Math.abs(k - centerIdx);
      // Gaussian falloff: e^(-dist²/(2σ²)), σ = CURL_RADIUS/2
      const sigma = CURL_RADIUS / 2;
      const falloff = Math.exp(-(dist * dist) / (2 * sigma * sigma));
      const angle = curlAngle * falloff;
      
      // Rotate the point around the curl axis, pivoting at the center point
      const pivot = result[centerIdx].clone();
      result[k].sub(pivot).applyAxisAngle(curlAxis, angle).add(pivot);
    }
    
    // Also push apart (deflection) for segment A side
    const pushDist = penetration * 0.4;
    for (let k = Math.max(0, col.segA - 2); k <= Math.min(result.length - 1, col.segA + 2); k++) {
      const influence = 1 - Math.abs(k - col.segA) * 0.25;
      result[k].addScaledVector(col.normal, pushDist * 0.5 * influence);
    }
    // Segment B side — opposite direction
    for (let k = Math.max(0, col.segB - 2); k <= Math.min(result.length - 1, col.segB + 2); k++) {
      const influence = 1 - Math.abs(k - col.segB) * 0.25;
      result[k].addScaledVector(col.normal, -pushDist * 0.5 * influence);
    }
  }
  
  return result;
}

/**
 * v8: Iterative collision resolution with curl.
 * Runs detect → deflect + curl → repeat until stable or max iterations.
 */
function resolveCollisionsWithCurl(points, wireDiam, maxIter = 5) {
  let current = points.map(p => p.clone());
  
  for (let iter = 0; iter < maxIter; iter++) {
    const collisions = detectCollisions(current, wireDiam);
    if (!collisions.length) break;
    
    // Apply deflection first
    current = applyDeflection(current, collisions, wireDiam);
    
    // Then apply curl
    const newCollisions = detectCollisions(current, wireDiam);
    if (newCollisions.length > 0) {
      current = applyCurlEffect(current, newCollisions, wireDiam);
    }
  }
  
  return current;
}

// v6: COLLISION VISUALIZATION
// ══════════════════════════════════════════════════════════════════
function clearCollisionVisuals() {
  collisionSpheres.forEach(s => { scene.remove(s); s.geometry.dispose(); });
  collisionSpheres = [];
  if (wireCollisionMesh) {
    scene.remove(wireCollisionMesh);
    wireCollisionMesh.geometry.dispose();
    wireCollisionMesh = null;
  }
  document.getElementById('collision-banner').style.display = 'none';
  collisionSegments.clear();
  // Clear editor highlights
  document.querySelectorAll('.steprow.collision').forEach(r => r.classList.remove('collision'));
}

function highlightCollisionSteps(collisions) {
  // Clear previous collision highlights
  document.querySelectorAll('.steprow.collision').forEach(r => r.classList.remove('collision'));
  
  if (!collisions.length || !stepMarkers.length) return;
  
  const colStepSet = new Set();
  for (const col of collisions) {
    // Find which steps own segA and segB
    for (let m = 0; m < stepMarkers.length; m++) {
      const mk = stepMarkers[m];
      if ((col.segA >= mk.startIdx && col.segA <= mk.endIdx) ||
          (col.segB >= mk.startIdx && col.segB <= mk.endIdx)) {
        colStepSet.add(m);
      }
    }
  }
  
  const rows = document.querySelectorAll('.steprow');
  colStepSet.forEach(idx => {
    if (rows[idx]) rows[idx].classList.add('collision');
  });
}

function showCollisionVisuals(collisions, transformedPoints, wireDiam) {
  clearCollisionVisuals();
  
  if (!collisions.length) {
    highlightCollisionSteps([]);
    updatePhysicsInfo(transformedPoints, wireDiam, 0);
    return;
  }
  
  // Highlight collision steps in editor
  highlightCollisionSteps(collisions);
  
  // Show banner
  document.getElementById('collision-count').textContent = collisions.length;
  document.getElementById('collision-banner').style.display = 'block';
  
  // Red spheres at collision points
  const sphereGeo = new THREE.SphereGeometry(wireDiam * 0.8, 12, 12);
  const sphereMat = new THREE.MeshStandardMaterial({
    color: 0xff0000, emissive: 0xff0000, emissiveIntensity: 0.5,
    transparent: true, opacity: 0.7
  });
  
  for (const col of collisions) {
    const sphere = new THREE.Mesh(sphereGeo, sphereMat);
    sphere.position.copy(col.point);
    scene.add(sphere);
    collisionSpheres.push(sphere);
    
    // Track colliding segments
    collisionSegments.add(col.segA);
    collisionSegments.add(col.segA + 1);
    collisionSegments.add(col.segB);
    collisionSegments.add(col.segB + 1);
  }
  
  // Red highlight on colliding wire sections
  if (collisionSegments.size > 0 && transformedPoints.length >= 2) {
    const colPoints = [];
    for (const idx of collisionSegments) {
      if (idx >= 0 && idx < transformedPoints.length) {
        colPoints.push(transformedPoints[idx]);
      }
    }
    // Create tube segments for collision areas
    for (const col of collisions) {
      const startA = Math.max(0, col.segA - 1);
      const endA = Math.min(transformedPoints.length - 1, col.segA + 2);
      const segPtsA = [];
      for (let k = startA; k <= endA; k++) segPtsA.push(transformedPoints[k]);
      
      if (segPtsA.length >= 2) {
        try {
          const curve = new THREE.CatmullRomCurve3(segPtsA, false, 'centripetal', 0.5);
          const geo = new THREE.TubeGeometry(curve, segPtsA.length * 3, wireDiam * 0.55, 8, false);
          const mesh = new THREE.Mesh(geo, MAT_COLLISION);
          scene.add(mesh);
          collisionSpheres.push(mesh); // reuse array for cleanup
        } catch(e) {}
      }
      
      const startB = Math.max(0, col.segB - 1);
      const endB = Math.min(transformedPoints.length - 1, col.segB + 2);
      const segPtsB = [];
      for (let k = startB; k <= endB; k++) segPtsB.push(transformedPoints[k]);
      
      if (segPtsB.length >= 2) {
        try {
          const curve = new THREE.CatmullRomCurve3(segPtsB, false, 'centripetal', 0.5);
          const geo = new THREE.TubeGeometry(curve, segPtsB.length * 3, wireDiam * 0.55, 8, false);
          const mesh = new THREE.Mesh(geo, MAT_COLLISION);
          scene.add(mesh);
          collisionSpheres.push(mesh);
        } catch(e) {}
      }
    }
  }
  
  updatePhysicsInfo(transformedPoints, wireDiam, collisions.length);
}

function updatePhysicsInfo(points, wireDiam, numCollisions) {
  const infoEl = document.getElementById('physics-info');
  if (!points || points.length < 3) {
    infoEl.innerHTML = '';
    return;
  }
  
  // Calculate min curvature radius
  let minRadius = Infinity;
  for (let i = 1; i < points.length - 1; i++) {
    const v1 = new THREE.Vector3().subVectors(points[i], points[i-1]);
    const v2 = new THREE.Vector3().subVectors(points[i+1], points[i]);
    const l1 = v1.length(), l2 = v2.length();
    if (l1 < 1e-6 || l2 < 1e-6) continue;
    const cross = new THREE.Vector3().crossVectors(v1, v2);
    const crossLen = cross.length();
    if (crossLen < 1e-8) continue;
    const d = new THREE.Vector3().subVectors(points[i+1], points[i-1]).length();
    const sinTheta = crossLen / (l1 * l2);
    const radius = d / (2 * sinTheta);
    if (radius < minRadius) minRadius = radius;
  }
  
  const minAllowed = wireDiam * minCurvatureMultiplier;
  const radiusOk = minRadius >= minAllowed || !isFinite(minRadius);
  
  infoEl.innerHTML = `
    <div>🔬 <b>물리엔진 v8</b></div>
    <div>최소 곡률반경: ${isFinite(minRadius) ? minRadius.toFixed(1) : '∞'} mm ${radiusOk ? '✅' : '<span class="warn">⚠️ &lt; ' + minAllowed.toFixed(1) + 'mm</span>'}</div>
    <div>충돌 감지: ${collisionEnabled ? (numCollisions > 0 ? '<span class="warn">⚠️ ' + numCollisions + '개소</span>' : '✅ 없음') : 'OFF'}</div>
    <div>자동 말림: ${autoCurlEnabled ? '<b>ON</b> 🌀' : 'OFF'}</div>
    <div>벤딩 방향: <b>역방향 제약</b> ✅ 검증완료</div>
  `;
}

// ══════════════════════════════════════════════════════════════════
// Piecewise-linear path — no spline wobble on straight sections
function makeLinearPath(points) {
  const path = new THREE.CurvePath();
  for (let i = 0; i < points.length - 1; i++) {
    // Skip zero-length segments (e.g. CUT adds duplicate point)
    if (points[i].distanceTo(points[i + 1]) < 0.001) continue;
    path.add(new THREE.LineCurve3(points[i], points[i + 1]));
  }
  return path;
}

// WIRE GENERATION (v6: with physics)
// ══════════════════════════════════════════════════════════════════
function generateArc(pos, forward, up, bendDir, bendDeg, R) {
  const pts = [];
  const absAng = Math.min(Math.abs(bendDeg), 360);
  if (absAng < 0.5 || R < 0.01) return { pts, newFwd: forward.clone(), newUp: up.clone() };
  const rad = THREE.MathUtils.degToRad(absAng);
  const sign = bendDeg >= 0 ? 1 : -1;
  const bDir = bendDir.clone().multiplyScalar(sign);
  const arcAxis = new THREE.Vector3().crossVectors(forward, bDir);
  if (arcAxis.length() < 1e-5) return { pts, newFwd: forward.clone(), newUp: up.clone() };
  arcAxis.normalize();
  const center = pos.clone().addScaledVector(bDir, R);
  const nSegs = Math.max(8, Math.ceil(absAng / 4));
  for (let j = 1; j <= nSegs; j++) {
    const t = (j / nSegs) * rad;
    const offset = bDir.clone().negate().applyAxisAngle(arcAxis, t).multiplyScalar(R);
    pts.push(center.clone().add(offset));
  }
  const newFwd = forward.clone().applyAxisAngle(arcAxis, rad).normalize();
  const newUp  = up.clone().applyAxisAngle(arcAxis, rad).normalize();
  return { pts, newFwd, newUp };
}

function generateWire(stepsArr, wireDiam, bendRFactor) {
  const all = [new THREE.Vector3()];
  const markers = [];
  let pos = new THREE.Vector3();
  let fwd = new THREE.Vector3(1, 0, 0);
  let up  = new THREE.Vector3(0, 1, 0);
  let totalLen = 0;

  stepsArr.forEach((step, i) => {
    const startIdx = all.length - 1;

    switch (step.type) {
      case 'FEED': {
        const len = Math.max(parseFloat(step.p1) || 0, 0);
        if (len > 0.01) {
          // v9: FEED = straight line. Only start + end point needed.
          // Intermediate points cause TubeGeometry cross-section artifacts.
          all.push(pos.clone().addScaledVector(fwd, len));
          pos = all[all.length - 1].clone();
          totalLen += len;
        } else { all.push(pos.clone()); }
        break;
      }
      case 'BEND': {
        const axN = parseInt(step.axis) || 1;
        const travel = parseFloat(step.p1) || 0;
        const directAngle = parseFloat(step.bendAngle) || 0;
        // Use direct angle if provided, otherwise calculate from travel
        const hasAngle = directAngle !== 0;
        const hasTravel = Math.abs(travel) > 0.01;
        if (hasAngle || hasTravel) {
          const right = new THREE.Vector3().crossVectors(fwd, up).normalize();
          const bDir = getBendDir(axN, up, right);
          
          // v9: Enforce minimum bend radius at source (not post-processing)
          const R = Math.max(wireDiam * bendRFactor, wireDiam * minCurvatureMultiplier);
          const angDeg = hasAngle ? directAngle : (travel / 10) * 90 * (4.0 / wireDiam);
          const res = generateArc(pos, fwd, up, bDir, angDeg, R);
          res.pts.forEach(p => all.push(p));
          if (res.pts.length) pos = res.pts[res.pts.length - 1].clone();
          
          // Update fwd/up to follow the arc — this is correct!
          // BEND changes the wire direction. Next FEED goes in the NEW direction.
          // The visual "straight from quill" effect is handled by transformWireForMachine
          // which places the last formed point at the origin.
          fwd = res.newFwd;
          up = res.newUp;
          totalLen += THREE.MathUtils.degToRad(Math.abs(angDeg)) * R;
        } else { all.push(pos.clone()); }
        break;
      }
      case 'RQ': {
        const ang = parseFloat(step.p1) || 0;
        // RQ rotates wire around feed axis — changes the up vector for next bends
        up.applyAxisAngle(fwd.clone().normalize(), THREE.MathUtils.degToRad(ang));
        up.normalize();
        all.push(pos.clone());
        break;
      }
      case 'SM': {
        const rots = Math.max(parseFloat(step.p1) || 1, 0.1);
        const cd   = Math.max(parseFloat(step.p2) || 10, 1);
        const CR = cd / 2;
        const pitch = wireDiam * 1.1;
        const totalAng = rots * Math.PI * 2;
        const segs = Math.ceil(rots * 40);
        const right = new THREE.Vector3().crossVectors(fwd, up).normalize();
        for (let k = 1; k <= segs; k++) {
          const t = (k / segs) * totalAng;
          all.push(
            pos.clone()
              .addScaledVector(fwd, (t / totalAng) * rots * pitch)
              .addScaledVector(right, CR * (Math.cos(t) - 1))
              .addScaledVector(up, CR * Math.sin(t))
          );
        }
        pos = all[all.length - 1].clone();
        totalLen += rots * Math.PI * cd;
        break;
      }
      case 'CAM': {
        const a1 = parseFloat(step.p1) || 0;
        const a2 = parseFloat(step.p2) || 90;
        const diff = a2 - a1;
        if (Math.abs(diff) > 0.5) {
          const right = new THREE.Vector3().crossVectors(fwd, up).normalize();
          const bDir = getBendDir(1, up, right);
          const R = wireDiam * bendRFactor;
          const angDeg = diff * 0.85;
          const res = generateArc(pos, fwd, up, bDir, angDeg, R);
          res.pts.forEach(p => all.push(p));
          if (res.pts.length) pos = res.pts[res.pts.length - 1].clone();
          
          // ★ v7 Machine model fix: same as BEND — rotate existing points, keep fwd fixed
          const absAng = Math.min(Math.abs(angDeg), 360);
          const rad = THREE.MathUtils.degToRad(absAng);
          const sign = angDeg >= 0 ? 1 : -1;
          const bDirSigned = bDir.clone().multiplyScalar(sign);
          const arcAxis = new THREE.Vector3().crossVectors(fwd, bDirSigned);
          if (arcAxis.length() > 1e-5) {
            arcAxis.normalize();
            for (let p = 0; p < all.length; p++) {
              all[p].sub(pos).applyAxisAngle(arcAxis, -rad).add(pos);
            }
          }
          // fwd and up intentionally NOT updated
          totalLen += THREE.MathUtils.degToRad(Math.abs(angDeg)) * R;
        } else { all.push(pos.clone()); }
        break;
      }
      case 'CUT':
      case 'SOL':
      default:
        all.push(pos.clone());
        break;
    }

    const endIdx = all.length - 1;
    const midIdx = Math.floor((startIdx + endIdx) / 2);
    markers.push({ i, type: step.type, axis: step.axis, startIdx, endIdx, pos: all[midIdx].clone() });
  });

  // v9: Skip enforceMinCurvature — it distorts arc points and causes wobble.
  // Minimum curvature is now enforced at generateArc level (bend radius floor).
  const enforcedPoints = all;

  const box = new THREE.Box3().setFromPoints(enforcedPoints);
  const sz  = new THREE.Vector3(); box.getSize(sz);
  const ctr = new THREE.Vector3(); box.getCenter(ctr);

  return { all: enforcedPoints, markers, totalLen, bbox: sz, center: ctr };
}

// ══════════════════════════════════════════════════════════════════
// TRANSFORM WIRE POINTS
// ══════════════════════════════════════════════════════════════════
function transformWireForMachine(rawPoints, upToIndex) {
  const endIdx = (upToIndex != null) ? Math.min(upToIndex, rawPoints.length - 1) : rawPoints.length - 1;
  if (endIdx < 0 || rawPoints.length === 0) return [];
  
  // 1. Find the direction of the last meaningful wire segment
  // Skip duplicate points (CUT/SOL add same-position points)
  let lastDir = new THREE.Vector3(1, 0, 0); // default = +X
  for (let k = endIdx; k >= 1; k--) {
    const d = rawPoints[k].clone().sub(rawPoints[k - 1]);
    if (d.length() > 0.01) {
      lastDir = d.normalize();
      break;
    }
  }
  
  // 2. Calculate rotation from lastDir to +X (quill direction)
  const quillDir = new THREE.Vector3(1, 0, 0);
  const quat = new THREE.Quaternion();
  quat.setFromUnitVectors(lastDir, quillDir);
  
  // 3. Apply: rotate all points around the last point, then translate last point to origin
  const pivot = rawPoints[endIdx];
  const transformed = [];
  for (let i = 0; i <= endIdx; i++) {
    const p = rawPoints[i].clone().sub(pivot); // translate pivot to origin
    p.applyQuaternion(quat);                   // rotate so last segment = +X
    transformed.push(p);
  }
  return transformed;
}

function generateFeedWire() {
  const pts = [];
  const guideEnd = new THREE.Vector3(90, 0, 0);
  const workPoint = new THREE.Vector3(0, 0, 0);
  for (let i = 0; i <= 10; i++) {
    pts.push(workPoint.clone().lerp(guideEnd.clone(), i / 10));
  }
  return pts;
}

// BUILD / CLEAR 3D WIRE
// ══════════════════════════════════════════════════════════════════
function clearWire() {
  if (wireMesh) { scene.remove(wireMesh); wireMesh.geometry.dispose(); wireMesh = null; }
  if (animLine) { scene.remove(animLine); animLine.geometry.dispose(); animLine = null; }
  if (feedWireLine) { scene.remove(feedWireLine); feedWireLine.geometry.dispose(); feedWireLine = null; }
  labelObjs.forEach(o => { o.element.remove(); scene.remove(o); });
  labelObjs = [];
  cutPieces.forEach(p => { scene.remove(p); if(p.geometry) p.geometry.dispose(); });
  cutPieces = [];
  clearCollisionVisuals();
}

function buildWire() {
  clearWire();
  if (!steps.length) return;
  const wd = parseFloat(document.getElementById('wdiam').value) || 4;
  const br = parseFloat(document.getElementById('bradius').value) || 1.5;
  const matKey = document.getElementById('wmat').value;

  const res = generateWire(steps, wd, br);
  wirePoints  = res.all;
  stepMarkers = res.markers;

  if (wirePoints.length < 2) { updateStats(res); return; }

  const transformed = transformWireForMachine(wirePoints);

  // Tube mesh
  try {
    const curve = new THREE.CatmullRomCurve3(transformed, false, 'centripetal', 0.5);
    const segs  = Math.max(transformed.length * 3, 30);
    const geo   = new THREE.TubeGeometry(curve, segs, wd / 2, 8, false);
    wireMesh    = new THREE.Mesh(geo, MATS[matKey] || MATS.steel);
    wireMesh.castShadow = true;
    scene.add(wireMesh);
  } catch (e) { console.warn('TubeGeometry failed', e); }

  // Feed wire
  const feedPts = generateFeedWire();
  if (feedPts.length >= 2) {
    const feedGeo = new THREE.BufferGeometry().setFromPoints(feedPts);
    const feedMat = new THREE.LineBasicMaterial({ color: 0x555555, linewidth: 1 });
    feedWireLine = new THREE.Line(feedGeo, feedMat);
    scene.add(feedWireLine);
  }

  // Step labels
  const offset = wirePoints[wirePoints.length - 1].clone().negate();
  res.markers.forEach(mk => {
    const step = steps[mk.i];
    if (!step) return;
    const cls = ({'RQ':'rq','CUT':'cut','SM':'sm','SOL':'sol'})[mk.type] || '';
    const el = document.createElement('div');
    el.className = 'slbl ' + cls;
    el.style.cursor = 'pointer';
    el.textContent = String(mk.i).padStart(2,'0') + ' ' + mk.type + (mk.axis && mk.type==='BEND' ? mk.axis : '');
    // Click/tap label → jump to that step in editor (works on mobile too)
    const jumpToStep = () => {
      // On mobile, ensure editor panel is visible
      const lp = document.getElementById('lp');
      if (lp.style.display === 'none') {
        lp.style.display = 'flex';
        const btn = document.getElementById('mobile-toggle');
        if (btn) { btn.textContent = '🎬'; btn.title = '3D 뷰 확대'; }
        onResize();
      }
      const rows = document.querySelectorAll('.steprow');
      if (rows[mk.i]) {
        // Highlight and scroll to the step row
        rows.forEach(r => { r.style.outline = ''; r.style.background = ''; });
        rows[mk.i].style.outline = '2px solid var(--cyan)';
        rows[mk.i].style.background = '#0a2a3a';
        // Small delay to let layout settle, then scroll
        setTimeout(() => {
          rows[mk.i].scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 100);
        // Remove highlight after 3s
        setTimeout(() => {
          if (rows[mk.i]) {
            rows[mk.i].style.outline = '';
            rows[mk.i].style.background = '';
          }
        }, 3000);
      }
    };
    el.addEventListener('click', jumpToStep);
    el.addEventListener('touchend', (e) => { e.preventDefault(); jumpToStep(); });
    const lobj = new CSS2DObject(el);
    const tpos = mk.pos.clone().add(offset);
    lobj.position.copy(tpos).addScaledVector(new THREE.Vector3(0,1,0), wd * 2.5);
    scene.add(lobj);
    labelObjs.push(lobj);
    if (!labelsVisible) el.style.display = 'none';
  });

  updateStats(res);

  // Check if wire goes behind quill (x > wireDiam in transformed coords = behind machine)
  const quillThreshold = wd * 2; // small tolerance
  let behindQuill = false;
  for (let pi = 0; pi < transformed.length - 1; pi++) {
    if (transformed[pi].x > quillThreshold) { behindQuill = true; break; }
  }
  if (behindQuill) {
    // Tint wire red to show it's invalid
    if (wireMesh) wireMesh.material = MAT_COLLISION;
  }

  // v6: Collision detection + v8: Auto curl
  if (collisionEnabled) {
    collisionPoints = detectCollisions(transformed, wd, stepMarkers);
    
    // v8: Auto curl — resolve collisions iteratively with curl effect
    if (autoCurlEnabled && collisionPoints.length > 0) {
      const resolved = resolveCollisionsWithCurl(transformed, wd, 5);
      // Update wire mesh with resolved points
      if (wireMesh) { scene.remove(wireMesh); wireMesh.geometry.dispose(); wireMesh = null; }
      if (resolved.length >= 2) {
        try {
          const curve = new THREE.CatmullRomCurve3(resolved, false, 'centripetal', 0.5);
          const segs = Math.max(resolved.length * 3, 30);
          const geo = new THREE.TubeGeometry(curve, segs, wd / 2, 8, false);
          wireMesh = new THREE.Mesh(geo, MATS[matKey] || MATS.steel);
          wireMesh.castShadow = true;
          scene.add(wireMesh);
        } catch(e) { console.warn('Auto-curl TubeGeometry failed', e); }
      }
      // Re-detect collisions after resolution
      collisionPoints = detectCollisions(resolved, wd, stepMarkers);
      showCollisionVisuals(collisionPoints, resolved, wd);
    } else {
      showCollisionVisuals(collisionPoints, transformed, wd);
    }
  } else {
    updatePhysicsInfo(transformed, wd, 0);
  }

  // Camera
  const tBox = new THREE.Box3().setFromPoints(transformed);
  const tSz = new THREE.Vector3(); tBox.getSize(tSz);
  const tCtr = new THREE.Vector3(); tBox.getCenter(tCtr);
  fitCamera(tCtr, tSz);
}

function fitCamera(ctr, sz) {
  const md = Math.max(sz.x, sz.y, sz.z, 40);
  camera.position.set(ctr.x + md * 0.8, ctr.y + md * 0.7, ctr.z + md * 1.3);
  controls.target.copy(ctr);
  controls.update();
}

function updateStats(res) {
  document.getElementById('s-len').textContent = (res.totalLen || 0).toFixed(1);
  document.getElementById('s-steps').textContent = steps.length;
  const ct = steps.reduce((s, st) => s + 0.4 * (100 / Math.max(parseFloat(st.speed) || 100, 1)), 0);
  document.getElementById('s-cycle').textContent = ct.toFixed(1);
  if (res.bbox)
    document.getElementById('s-bbox').textContent =
      `${res.bbox.x.toFixed(0)}×${res.bbox.y.toFixed(0)}×${res.bbox.z.toFixed(0)}`;
}

// ══════════════════════════════════════════════════════════════════
// SIMULATION ANIMATION
// ══════════════════════════════════════════════════════════════════
function getStepPhases(step) {
  const speed = simSpeedMult;
  // v8: More realistic durations based on actual CNC machine timing
  const feedLen = Math.max(parseFloat(step.p1) || 10, 1);
  const bendTravel = Math.abs(parseFloat(step.p1) || 0);
  
  switch (step.type) {
    case 'FEED':
      // Duration proportional to feed length (longer wire = more time)
      return [{ name: 'feed', duration: Math.max(0.5, feedLen * 0.06) / speed }];
    case 'BEND':
      return [
        { name: 'slide-in', duration: 0.4 / speed },
        { name: 'bend', duration: Math.max(0.6, bendTravel * 0.08) / speed },
        { name: 'slide-out', duration: 0.3 / speed }
      ];
    case 'RQ': {
      const rotAngle = Math.abs(parseFloat(step.p1) || 0);
      return [{ name: 'rotate', duration: Math.max(0.4, rotAngle * 0.005) / speed }];
    }
    case 'SM': {
      const revs = Math.max(parseFloat(step.p1) || 1, 0.5);
      return [{ name: 'feed', duration: Math.max(1.0, revs * 0.5) / speed }];
    }
    case 'CAM':
      return [
        { name: 'slide-in', duration: 0.35 / speed },
        { name: 'bend', duration: 0.7 / speed },
        { name: 'slide-out', duration: 0.25 / speed }
      ];
    case 'CUT':
      return [
        { name: 'cut-in', duration: 0.35 / speed },
        { name: 'cut-drop', duration: 1.0 / speed }
      ];
    default:
      return [{ name: 'feed', duration: 0.3 / speed }];
  }
}

let simTimeline = [];
let simTimelineIdx = 0;
let simElapsed = 0;

function buildSimTimeline() {
  simTimeline = [];
  for (let si = 0; si < steps.length; si++) {
    const phases = getStepPhases(steps[si]);
    const marker = stepMarkers[si];
    if (!marker) continue;
    phases.forEach(ph => {
      simTimeline.push({
        stepIdx: si,
        phaseName: ph.name,
        duration: ph.duration,
        startPtIdx: marker.startIdx,
        endPtIdx: marker.endIdx,
        axisNum: parseInt(steps[si].axis) || 1
      });
    });
  }
}

function playAnim() {
  if (!wirePoints.length) { buildWire(); if (!wirePoints.length) return; }

  if (simMode) {
    buildSimTimeline();
    simTimelineIdx = 0;
    simElapsed = 0;
    simSlidePositions.fill(0);
    updateSlidePositions();
  }

  animProgress = 0;
  animCurStep  = -1;
  animPlaying  = true;
  if (wireMesh) wireMesh.visible = false;
  if (feedWireLine) feedWireLine.visible = false;
  labelObjs.forEach(l => { l.element.style.display = 'none'; });
  clearCollisionVisuals();
  document.getElementById('btn-play').classList.add('on');
  document.getElementById('progress-bar').style.width = '0%';
  document.getElementById('sim-info').style.display = simMode ? 'block' : 'none';
  document.getElementById('sim-info').innerHTML = simMode ? '🎬 시뮬레이션 시작...' : '';

  cutPieces.forEach(p => { scene.remove(p); if(p.geometry) p.geometry.dispose(); });
  cutPieces = [];
}

function pauseAnim() {
  animPlaying = false;
  document.getElementById('btn-play').classList.remove('on');
}

function resetAnim() {
  pauseAnim();
  animProgress = 0;
  animCurStep  = -1;
  simTimelineIdx = 0;
  simElapsed = 0;
  simSlidePositions.fill(0);
  updateSlidePositions();
  if (animLine) { scene.remove(animLine); animLine.geometry.dispose(); animLine = null; }
  if (wireMesh) wireMesh.visible = true;
  if (feedWireLine) feedWireLine.visible = true;
  labelObjs.forEach(l => { l.element.style.display = labelsVisible ? '' : 'none'; });
  document.getElementById('stepind').textContent = 'STEP: --';
  document.getElementById('progress-bar').style.width = '0%';
  document.getElementById('sim-info').style.display = 'none';
  highlightStep(-1);
  cutPieces.forEach(p => { scene.remove(p); if(p.geometry) p.geometry.dispose(); });
  cutPieces = [];
  // Re-run collision detection on full wire
  if (collisionEnabled && wirePoints.length >= 2) {
    const wd = parseFloat(document.getElementById('wdiam').value) || 4;
    const transformed = transformWireForMachine(wirePoints);
    collisionPoints = detectCollisions(transformed, wd, stepMarkers);
    showCollisionVisuals(collisionPoints, transformed, wd);
  }
}

function tickAnim(dt) {
  if (!animPlaying || wirePoints.length < 2) return;
  if (simMode) {
    tickSimMode(dt);
  } else {
    tickInstantMode(dt);
  }
}

function tickInstantMode(dt) {
  const SPEED = 60;
  animProgress = Math.min(animProgress + SPEED * dt, wirePoints.length - 1);

  const pct = (animProgress / Math.max(wirePoints.length - 1, 1)) * 100;
  document.getElementById('progress-bar').style.width = pct.toFixed(1) + '%';

  let cs = -1;
  for (let i = 0; i < stepMarkers.length; i++) {
    if (animProgress >= stepMarkers[i].startIdx) cs = i;
    else break;
  }

  if (cs !== animCurStep) {
    animCurStep = cs;
    highlightStep(cs);
    const st = cs >= 0 && steps[cs] ? steps[cs].type : '';
    const ax = cs >= 0 && steps[cs] && steps[cs].axis && st === 'BEND' ? steps[cs].axis : '';
    document.getElementById('stepind').textContent = `STEP: ${String(cs).padStart(2,'0')} ${st}${ax ? ' X'+ax : ''}`;
    labelObjs.forEach((l, li) => {
      l.element.style.display = (li <= cs && labelsVisible) ? '' : 'none';
    });
    if (cs >= 0) {
      const rows = document.querySelectorAll('.steprow');
      if (rows[cs]) rows[cs].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }
  }

  if (animLine) { scene.remove(animLine); animLine.geometry.dispose(); animLine = null; }
  const n = Math.ceil(animProgress) + 1;
  const partialRaw = wirePoints.slice(0, n);
  const transformed = transformWireForMachine(partialRaw);
  if (transformed.length >= 2) {
    const geo = new THREE.BufferGeometry().setFromPoints(transformed);
    animLine = new THREE.Line(geo, ANIM_MAT);
    scene.add(animLine);
  }

  if (animProgress >= wirePoints.length - 1) {
    finishAnim();
  }
}

function tickSimMode(dt) {
  if (simTimelineIdx >= simTimeline.length) {
    finishAnim();
    return;
  }

  const entry = simTimeline[simTimelineIdx];
  simElapsed += dt;

  const phaseProgress = Math.min(simElapsed / entry.duration, 1.0);
  const easedProgress = easeInOut(phaseProgress);

  // Update step info when step changes
  if (entry.stepIdx !== animCurStep) {
    animCurStep = entry.stepIdx;
    highlightStep(entry.stepIdx);
    const step = steps[entry.stepIdx];
    let stepDesc = '';
    if (step) {
      switch(step.type) {
        case 'FEED': stepDesc = `🔩 와이어 사출 ${step.p1}mm ...`; break;
        case 'BEND': stepDesc = `⚙️ X${step.axis} 슬라이드 벤딩 ${step.p1}mm ...`; break;
        case 'RQ':   stepDesc = `🔄 퀼 회전 ${step.p1}° ...`; break;
        case 'SM':   stepDesc = `🌀 코일 성형 ${step.p1}rev ...`; break;
        case 'CAM':  stepDesc = `🎯 CAM 벤드 ${step.p1}°→${step.p2}° ...`; break;
        case 'CUT':  stepDesc = `✂️ 와이어 커팅`; break;
        default:     stepDesc = step.type;
      }
    }
    document.getElementById('stepind').textContent = stepDesc;

    labelObjs.forEach((l, li) => {
      l.element.style.display = (li <= entry.stepIdx && labelsVisible) ? '' : 'none';
    });

    const rows = document.querySelectorAll('.steprow');
    if (rows[entry.stepIdx]) rows[entry.stepIdx].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  // ── v8: Per-step point index based on stepMarkers ──
  const marker = stepMarkers[entry.stepIdx];
  let ptIdx;

  // Slide positions for all axes
  simSlidePositions.fill(0);

  if (entry.phaseName === 'feed') {
    // v8: Wire emerges from nozzle gradually
    // Interpolate within this step's point range
    if (marker) {
      const range = marker.endIdx - marker.startIdx;
      ptIdx = marker.startIdx + Math.round(range * easedProgress);
    } else {
      ptIdx = Math.floor(easedProgress * (wirePoints.length - 1));
    }
    // Update sim-info with feed progress
    const step = steps[entry.stepIdx];
    if (step) {
      const feedLen = parseFloat(step.p1) || 0;
      const fed = (feedLen * easedProgress).toFixed(1);
      document.getElementById('sim-info').innerHTML = `🔩 사출: <b>${fed}</b> / ${feedLen} mm`;
    }
  } else if (entry.phaseName === 'slide-in') {
    // Slide advancing toward wire — show wire up to bend start
    const axIdx = entry.axisNum - 1;
    if (axIdx >= 0 && axIdx < 8) simSlidePositions[axIdx] = easedProgress;
    ptIdx = marker ? marker.startIdx : 0;
    document.getElementById('sim-info').innerHTML = `⚙️ X${entry.axisNum} 슬라이드 전진 중...`;
  } else if (entry.phaseName === 'bend') {
    // v8: Wire gradually bends as slide holds
    const axIdx = entry.axisNum - 1;
    if (axIdx >= 0 && axIdx < 8) simSlidePositions[axIdx] = 1.0;
    if (marker) {
      const range = marker.endIdx - marker.startIdx;
      ptIdx = marker.startIdx + Math.round(range * easedProgress);
    } else {
      ptIdx = Math.floor(easedProgress * (wirePoints.length - 1));
    }
    const step = steps[entry.stepIdx];
    const bendPct = (easedProgress * 100).toFixed(0);
    document.getElementById('sim-info').innerHTML = `⚙️ X${entry.axisNum} 벤딩 진행: <b>${bendPct}%</b>`;
  } else if (entry.phaseName === 'slide-out') {
    // Slide retracting — bend complete
    const axIdx = entry.axisNum - 1;
    if (axIdx >= 0 && axIdx < 8) simSlidePositions[axIdx] = 1.0 - easedProgress;
    ptIdx = marker ? marker.endIdx : wirePoints.length - 1;
    document.getElementById('sim-info').innerHTML = `⚙️ X${entry.axisNum} 슬라이드 후퇴`;
  } else if (entry.phaseName === 'rotate') {
    // Quill rotation
    ptIdx = marker ? marker.endIdx : wirePoints.length - 1;
    const step = steps[entry.stepIdx];
    const ang = parseFloat(step?.p1 || 0);
    const rotated = (ang * easedProgress).toFixed(0);
    document.getElementById('sim-info').innerHTML = `🔄 퀼 회전: <b>${rotated}°</b> / ${ang}°`;
  } else if (entry.phaseName === 'cut-in') {
    // v8: X4 cutter slide advances
    simSlidePositions[3] = easedProgress; // X4 = index 3
    ptIdx = wirePoints.length - 1;
    document.getElementById('sim-info').innerHTML = `✂️ X4 커터 전진 중...`;
  } else if (entry.phaseName === 'cut-drop') {
    // v8: Cut complete → piece falls with gravity
    ptIdx = wirePoints.length - 1;
    document.getElementById('sim-info').innerHTML = `✂️ 절단 완료 — 완성품 낙하`;
  } else {
    ptIdx = marker ? marker.endIdx : wirePoints.length - 1;
  }

  updateSlidePositions();

  // ── Calculate accumulated points ──
  // All points from previous steps + current step's progress
  let totalPtIdx;
  if (marker) {
    // Include all previous steps' points + current step progress
    totalPtIdx = Math.min(ptIdx, wirePoints.length - 1);
  } else {
    totalPtIdx = Math.min(ptIdx, wirePoints.length - 1);
  }

  // ── Global progress bar ──
  let totalPhases = simTimeline.length;
  let globalProgress = simTimelineIdx + phaseProgress;
  const pct = (globalProgress / totalPhases) * 100;
  document.getElementById('progress-bar').style.width = pct.toFixed(1) + '%';

  // ── Render wire ──
  if (animLine) { scene.remove(animLine); animLine.geometry.dispose(); animLine = null; }
  
  const n = Math.min(totalPtIdx + 1, wirePoints.length);
  if (n >= 2) {
    const partialRaw = wirePoints.slice(0, n);
    const transformed = transformWireForMachine(partialRaw);
    if (transformed.length >= 2) {
      const wd = parseFloat(document.getElementById('wdiam').value) || 4;
      const matKey = document.getElementById('wmat').value;
      
      // v8: Use tube geometry for sim mode too (more realistic)
      try {
        const curve = new THREE.CatmullRomCurve3(transformed, false, 'centripetal', 0.5);
        const segs = Math.max(transformed.length * 2, 16);
        const geo = new THREE.TubeGeometry(curve, segs, wd / 2, 6, false);
        const simWireMat = (MATS[matKey] || MATS.steel).clone();
        simWireMat.emissive = new THREE.Color(0x331166);
        simWireMat.emissiveIntensity = 0.15;
        animLine = new THREE.Mesh(geo, simWireMat);
        animLine.castShadow = true;
        scene.add(animLine);
      } catch(e) {
        // Fallback to line
        const geo = new THREE.BufferGeometry().setFromPoints(transformed);
        animLine = new THREE.Line(geo, ANIM_MAT_SIM);
        scene.add(animLine);
      }
    }
  }

  // v8: Cut drop — gravity effect on completed piece
  if (entry.phaseName === 'cut-drop' && phaseProgress > 0.05) {
    if (animLine) {
      // Gravity: y = -½gt², simulate with easeIn
      const dropY = -easeIn(phaseProgress) * 60;
      // Also slight rotation for realistic tumbling
      const tumble = easeIn(phaseProgress) * 0.3;
      animLine.position.y = dropY;
      animLine.rotation.z = tumble;
      animLine.rotation.x = tumble * 0.5;
      
      // Fade out near the end
      if (phaseProgress > 0.7 && animLine.material) {
        animLine.material.transparent = true;
        animLine.material.opacity = 1.0 - (phaseProgress - 0.7) / 0.3;
      }
    }
  }

  // Advance to next phase
  if (phaseProgress >= 1.0) {
    simElapsed = 0;
    simTimelineIdx++;
    if (entry.phaseName === 'slide-out' || entry.phaseName === 'cut-drop') {
      simSlidePositions.fill(0);
      updateSlidePositions();
    }
  }
}

function finishAnim() {
  animPlaying = false;
  document.getElementById('btn-play').classList.remove('on');
  if (animLine) { scene.remove(animLine); animLine.geometry.dispose(); animLine = null; }
  if (wireMesh) wireMesh.visible = true;
  if (feedWireLine) feedWireLine.visible = true;
  labelObjs.forEach(l => { l.element.style.display = labelsVisible ? '' : 'none'; });
  document.getElementById('stepind').textContent = simMode ? '✅ 시뮬레이션 완료' : 'STEP: 완료 ✓';
  document.getElementById('progress-bar').style.width = '100%';
  document.getElementById('sim-info').style.display = 'none';
  simSlidePositions.fill(0);
  updateSlidePositions();
  
  // v6: Show collision detection on final wire
  if (collisionEnabled && wirePoints.length >= 2) {
    const wd = parseFloat(document.getElementById('wdiam').value) || 4;
    const transformed = transformWireForMachine(wirePoints);
    collisionPoints = detectCollisions(transformed, wd, stepMarkers);
    showCollisionVisuals(collisionPoints, transformed, wd);
  }
}

function easeInOut(t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }
function easeIn(t) { return t * t; }

function highlightStep(idx) {
  document.querySelectorAll('.steprow').forEach((r, i) => {
    r.classList.toggle('playing', i === idx);
    r.classList.toggle('done', i < idx);
  });
}

// ══════════════════════════════════════════════════════════════════
// TOGGLE AXIS/SLIDES VISIBILITY
// ══════════════════════════════════════════════════════════════════
function toggleAxisGuide() {
  axisVisible = !axisVisible;
  if (machineGroup) machineGroup.visible = axisVisible;
  const btn = document.getElementById('axis-toggle-btn');
  btn.textContent = axisVisible ? '🎯 축/슬라이드 ON' : '🎯 축/슬라이드 OFF';
  btn.classList.toggle('axis-on', axisVisible);
}

// ══════════════════════════════════════════════════════════════════
// v6: RESOLVE COLLISIONS (deflection button)
// ══════════════════════════════════════════════════════════════════
function resolveCollisions() {
  if (!collisionPoints.length || wirePoints.length < 2) return;
  
  const wd = parseFloat(document.getElementById('wdiam').value) || 4;
  const transformed = transformWireForMachine(wirePoints);
  const resolved = applyDeflection(transformed, collisionPoints, wd);
  
  // Reverse transform back to raw points
  const lastPt = wirePoints[wirePoints.length - 1];
  wirePoints = resolved.map(p => p.clone().add(lastPt));
  
  // Rebuild the wire mesh with resolved points
  clearWire();
  
  const matKey = document.getElementById('wmat').value;
  const transformedNew = transformWireForMachine(wirePoints);
  
  if (transformedNew.length >= 2) {
    try {
      const curve = new THREE.CatmullRomCurve3(transformedNew, false, 'centripetal', 0.5);
      const segs  = Math.max(transformedNew.length * 3, 30);
      const geo   = new THREE.TubeGeometry(curve, segs, wd / 2, 8, false);
      wireMesh    = new THREE.Mesh(geo, MATS[matKey] || MATS.steel);
      wireMesh.castShadow = true;
      scene.add(wireMesh);
    } catch (e) { console.warn('TubeGeometry failed', e); }
    
    // Feed wire
    const feedPts = generateFeedWire();
    if (feedPts.length >= 2) {
      const feedGeo = new THREE.BufferGeometry().setFromPoints(feedPts);
      const feedMat = new THREE.LineBasicMaterial({ color: 0x555555, linewidth: 1 });
      feedWireLine = new THREE.Line(feedGeo, feedMat);
      scene.add(feedWireLine);
    }
    
    // Re-check collisions
    collisionPoints = detectCollisions(transformedNew, wd);
    showCollisionVisuals(collisionPoints, transformedNew, wd);
    
    // Labels
    const offset = wirePoints[wirePoints.length - 1].clone().negate();
    stepMarkers.forEach(mk => {
      const step = steps[mk.i];
      if (!step) return;
      const cls = ({'RQ':'rq','CUT':'cut','SM':'sm','SOL':'sol'})[mk.type] || '';
      const el = document.createElement('div');
      el.className = 'slbl ' + cls;
      el.textContent = String(mk.i).padStart(2,'0') + ' ' + mk.type + (mk.axis && mk.type==='BEND' ? mk.axis : '');
      const lobj = new CSS2DObject(el);
      const tpos = mk.pos.clone().add(offset);
      lobj.position.copy(tpos).addScaledVector(new THREE.Vector3(0,1,0), wd * 2.5);
      scene.add(lobj);
      labelObjs.push(lobj);
      if (!labelsVisible) el.style.display = 'none';
    });
  }
}

// ══════════════════════════════════════════════════════════════════
// STEP EDITOR
// ══════════════════════════════════════════════════════════════════
const TYPES_M1 = ['FEED','BEND','RQ','SM','CUT','SOL'];
const TYPES_M2 = ['FEED','CAM','RQ','CUT'];
function getTypes() { return machine === 1 ? TYPES_M1 : TYPES_M2; }

function mkStep(type, o={}) {
  return { id: ++stepIdSeq, type, axis:'1', p1:'10', p2:'', speed:'100', ...o };
}

function addStep(type, o={}) {
  const newStep = mkStep(type || getTypes()[0], o);
  let lastCutIdx = -1;
  for (let i = steps.length - 1; i >= 0; i--) {
    if (steps[i].type === 'CUT') { lastCutIdx = i; break; }
  }
  if (lastCutIdx >= 0) steps.splice(lastCutIdx, 0, newStep);
  else steps.push(newStep);
  renderSteps(); buildWire();
}

function delStep(id) {
  const step = steps.find(s => s.id === id);
  if (!step || step.type === 'CUT') return;
  steps = steps.filter(s => s.id !== id);
  renderSteps(); buildWire();
}

// Engineering validation — checks each step for physical impossibility
// Returns { warnings: [{idx, msgs}], blocked: boolean, blockMsg: string }
function validateSteps(stepsArr) {
  const wd = parseFloat(document.getElementById('rng-diam')?.value) || 4;
  const R = wd * (parseFloat(document.getElementById('rng-rfactor')?.value) || 1.5);
  const warnings = [];
  let blocked = false;
  let blockMsg = '';
  let lastType = null;
  let consecutiveBends = 0;
  let lastFeedLen = 0;
  let totalBendAngle = 0;

  stepsArr.forEach((step, i) => {
    const msgs = [];
    let isBlock = false;

    if (step.type === 'FEED') {
      const len = parseFloat(step.p1) || 0;
      if (len > 0 && len < wd) {
        msgs.push(`⚠ FEED ${len}mm < 선경 ${wd}mm — 너무 짧음`);
      }
      if (len > 0 && len < R && lastType === 'BEND') {
        msgs.push(`⚠ FEED ${len}mm < 벤드반경 ${R}mm — 다음 벤드 간섭 가능`);
      }
      lastFeedLen = len;
      consecutiveBends = 0;
    }

    if (step.type === 'BEND') {
      const travel = parseFloat(step.p1) || 0;
      const angle = parseFloat(step.bendAngle) || ((travel / 10) * 90 * (4.0 / wd));
      
      if (Math.abs(angle) > 170) {
        msgs.push(`🚫 벤드 ${Math.round(angle)}° > 170° — 물리적 한계 초과`);
        isBlock = true;
      } else if (Math.abs(angle) > 135) {
        msgs.push(`⚠ 벤드 ${Math.round(angle)}° > 135° — 극한 벤딩, 스프링백 큼`);
      }

      if (lastType === 'BEND') {
        consecutiveBends++;
        if (consecutiveBends >= 2) {
          msgs.push(`🚫 연속 벤드 ${consecutiveBends+1}회 — FEED 없이 연속 불가`);
          isBlock = true;
        } else {
          msgs.push(`⚠ 연속 벤드 — FEED 삽입 권장`);
        }
      } else {
        consecutiveBends = 0;
      }

      totalBendAngle += Math.abs(angle);
      if (totalBendAngle > 300) {
        msgs.push(`🚫 누적 벤드 ${Math.round(totalBendAngle)}° > 300° — 사출기 뒤로 관통`);
        isBlock = true;
      }

      if (lastFeedLen > 0 && lastFeedLen < wd * 1.5 && lastType === 'FEED') {
        msgs.push(`⚠ 직전 FEED ${lastFeedLen}mm 짧음 — 슬라이드 간섭 가능`);
      }
    }

    if (step.type === 'CUT' && i === 0) {
      msgs.push(`🚫 첫 스텝이 CUT — FEED 먼저 필요`);
      isBlock = true;
    }

    lastType = step.type;
    if (msgs.length > 0) warnings.push({ idx: i, msgs, isBlock });
    if (isBlock) { blocked = true; blockMsg = msgs.find(m => m.startsWith('🚫')) || msgs[0]; }
  });

  return { warnings, blocked, blockMsg };
}

function setStep(id, k, v) {
  const s = steps.find(s => s.id === id);
  if (!s) return;
  s[k] = v;
  // Sync angle ↔ travel for BEND steps
  if (s.type === 'BEND') {
    const wd = parseFloat(document.getElementById('rng-diam')?.value) || 4;
    if (k === 'bendAngle' && v) {
      // Angle entered → calculate travel: travel = angDeg / (90 * 4/wd) * 10
      const ang = parseFloat(v) || 0;
      s.p1 = ((ang / 90) * (wd / 4) * 10).toFixed(1);
    } else if (k === 'p1' && v && !s.bendAngle) {
      // Travel entered without angle → clear angle (let formula calculate)
      s.bendAngle = '';
    }
  }
  buildWire();
  if (k === 'bendAngle' || (k === 'p1' && s.type === 'BEND')) renderSteps();
}

function renderSteps() {
  const list = document.getElementById('steplist');
  list.innerHTML = '';
  steps.forEach((step, idx) => {
    const row = document.createElement('div');
    row.className = 'steprow';
    if (step.type === 'CUT') row.classList.add('cut-row');
    row.dataset.id = step.id;

    const numEl = document.createElement('span');
    numEl.className = 'stepnum';
    numEl.textContent = String(idx).padStart(2,'0');
    row.appendChild(numEl);

    const typeEl = document.createElement('select');
    typeEl.className = 'si';
    typeEl.style.minWidth = '58px';
    getTypes().forEach(t => {
      const o = document.createElement('option');
      o.value = t; o.textContent = t;
      if (t === step.type) o.selected = true;
      typeEl.appendChild(o);
    });
    typeEl.addEventListener('change', e => { setStep(step.id, 'type', e.target.value); renderSteps(); });
    row.appendChild(typeEl);

    buildParams(row, step);

    const spd = document.createElement('input');
    spd.className = 'si'; spd.type='number';
    spd.style.width='38px'; spd.value=step.speed;
    spd.min=1; spd.max=100; spd.title='속도(%)';
    spd.addEventListener('change', e => setStep(step.id,'speed',e.target.value));
    row.appendChild(spd);
    const spL = document.createElement('span');
    spL.className='slabel'; spL.textContent='%속도';
    row.appendChild(spL);

    const del = document.createElement('button');
    del.className='sdel'; del.title='삭제';
    if (step.type === 'CUT') {
      del.textContent = '🔒';
      del.disabled = true;
      del.title = 'CUT은 항상 존재합니다';
    } else {
      del.textContent = '×';
      del.addEventListener('click', () => delStep(step.id));
    }
    row.appendChild(del);
    list.appendChild(row);
  });

  // Engineering validation
  const validation = validateSteps(steps);
  const rows = list.querySelectorAll('.steprow');
  validation.warnings.forEach(w => {
    if (rows[w.idx]) {
      rows[w.idx].classList.add(w.isBlock ? 'eng-block' : 'eng-warn');
      const msgEl = document.createElement('div');
      msgEl.className = 'eng-msg';
      msgEl.innerHTML = w.msgs.join('<br>');
      rows[w.idx].appendChild(msgEl);
    }
  });
  // Show/hide blocked banner
  const blockedEl = document.getElementById('sim-blocked');
  if (blockedEl) {
    if (validation.blocked) {
      blockedEl.style.display = 'block';
      blockedEl.textContent = '🚫 ' + validation.blockMsg;
    } else {
      blockedEl.style.display = 'none';
    }
  }
}

function buildParams(row, step) {
  function mkI(field, val, w, ph) {
    const el = document.createElement('input');
    el.className='si'; el.type='number'; el.value=val||''; el.style.width=w||'46px';
    if(ph) el.placeholder=ph;
    el.addEventListener('change', e => setStep(step.id, field, e.target.value));
    el.addEventListener('input',  e => setStep(step.id, field, e.target.value));
    return el;
  }
  function mkL(t) {
    const el=document.createElement('span');el.className='slabel';el.textContent=t;return el;
  }
  function mkSel(opts, field, cur, w) {
    const el=document.createElement('select');el.className='si';el.style.minWidth=w||'50px';
    opts.forEach(([v,t])=>{ const o=document.createElement('option');o.value=v;o.textContent=t;
      if(v===String(cur)) o.selected=true; el.appendChild(o); });
    el.addEventListener('change', e => setStep(step.id, field, e.target.value));
    return el;
  }

  switch(step.type) {
    case 'FEED':
      row.appendChild(mkI('p1', step.p1, '55px'));
      row.appendChild(mkL('mm'));
      break;
    case 'BEND': {
      const axes = Array.from({length:8},(_,i)=>[(i+1).toString(),`X${i+1}`]);
      row.appendChild(mkSel(axes,'axis',step.axis,'48px'));
      // Bend angle input (degrees) — direct angle control
      const angVal = step.bendAngle || '';
      const travelVal = step.p1 || '';
      row.appendChild(mkI('bendAngle', angVal, '44px', '°'));
      row.appendChild(mkL('°'));
      // Also show travel (mm) as secondary reference
      const travelInput = mkI('p1', travelVal, '40px', 'mm');
      travelInput.style.color = '#666';
      travelInput.title = 'travel(mm) — 각도 입력 시 자동계산';
      row.appendChild(travelInput);
      row.appendChild(mkL('mm'));
      break;
    }
    case 'RQ':
      row.appendChild(mkI('p1', step.p1, '50px','°'));
      row.appendChild(mkL('°'));
      break;
    case 'SM':
      row.appendChild(mkI('p1', step.p1, '44px','rev'));
      row.appendChild(mkL('rev'));
      row.appendChild(mkI('p2', step.p2||'10', '42px','Φ'));
      row.appendChild(mkL('Φmm'));
      break;
    case 'CAM':
      row.appendChild(mkI('p1',step.p1,'44px','시작°'));
      row.appendChild(mkL('→'));
      row.appendChild(mkI('p2',step.p2||'90','44px','종료°'));
      row.appendChild(mkL('°'));
      break;
    case 'CUT': {
      const l=document.createElement('span');
      l.style.cssText='color:#ff4444;font-size:11px;padding:0 4px;flex:1;';
      l.textContent='✂ WIRE CUT (항상 마지막)';
      row.appendChild(l); break;
    }
    case 'SOL': {
      const sols=[['SOL01','SOL01'],['SOL02','SOL02'],['SOL03','SOL03'],['SOL04','SOL04']];
      row.appendChild(mkSel(sols,'axis',step.axis||'SOL01','56px'));
      row.appendChild(mkSel([['ON','ON'],['OFF','OFF']],'p1',step.p1||'ON','42px'));
      break;
    }
  }
}

function loadPreset(key) {
  const p = PRESETS[key];
  if (!p) return;
  if (p.m && p.m !== machine) { selectMachine(p.m); return; }
  steps = p.steps.map(s => mkStep(s.type, s));
  renderSteps(); buildWire();
}

function buildPresetBtns() {
  const wrap = document.getElementById('prbtnwrap');
  wrap.innerHTML = '';
  Object.entries(PRESETS).forEach(([k, p]) => {
    if (p.m && p.m !== machine) return;
    const btn = document.createElement('button');
    btn.className = 'prbtn'; btn.textContent = p.label;
    btn.addEventListener('click', () => loadPreset(k));
    wrap.appendChild(btn);
  });
}

const SHAPE_PATTERNS = [
  { keywords: ['u자','u훅','uhook','U자','U훅','유자'], preset: 'uhook', label: 'U훅' },
  { keywords: ['사각형','사각','네모','square','정사각','직사각'], preset: 'square', label: '사각 프레임' },
  { keywords: ['s자','s클립','sclip','S자','S클립','에스'], preset: 'sclip', label: 'S클립' },
  { keywords: ['코일','coil','스프링','spring','나선'], preset: 'coil5', label: '코일 5권' },
  { keywords: ['3d','3d클립','clip3d','3디'], preset: 'clip3d', label: '3D 클립' },
  { keywords: ['비틀림','토션','torsion','torsional'], preset: 'spring_torsion', label: '비틀림 스프링' },
  { keywords: ['지그재그','zigzag','지그','zig'], preset: 'cam_zigzag', label: 'CAM 지그재그' },
  { keywords: ['cam','캠'], preset: 'cam_simple', label: 'CAM 단순 벤드' },
  { keywords: ['l자','l훅','lhook','엘자','엘훅'], preset: 'lhook', label: 'L훅' },
  { keywords: ['z자','z클립','z형','지그재그','계단'], preset: 'zhook', label: 'Z형 클립' },
];

function matchShape(desc) {
  const lower = desc.toLowerCase().trim();
  for (const pattern of SHAPE_PATTERNS) {
    for (const kw of pattern.keywords) {
      if (lower.includes(kw.toLowerCase())) return pattern;
    }
  }
  return null;
}
